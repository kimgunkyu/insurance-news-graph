# ─────────────────────────────────────────────
# daily.yml
# 매일 오전 8시(한국시간)에 Render 서버의 크롤링 API를 호출
# (실제 크롤링은 Render에서 실행됨 - GitHub Actions는 신호만 보냄)
# ─────────────────────────────────────────────

name: 매일 보험 뉴스 수집

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 UTC 23시 = 한국시간 오전 8시
  workflow_dispatch:         # 수동으로도 실행 가능

jobs:
  trigger-render-crawl:
    runs-on: ubuntu-latest

    steps:
      # Render의 크롤링 API를 호출 (실제 작업은 Render 서버에서 수행)
      - name: Render 크롤링 API 호출
        run: |
          echo "🚀 Render 서버에 크롤링 요청 전송..."
          curl -X POST https://insurance-news-graph.onrender.com/api/fetch \
            --max-time 600 \
            -w "\nHTTP 상태 코드: %{http_code}\n"
          echo "✅ 요청 완료"