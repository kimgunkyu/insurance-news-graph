<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보험 뉴스 관계도</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #21262d;
    --text: #e6edf3; --text-muted: #7d8590; --accent: #2d6be4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif; height: 100vh; display: flex; overflow: hidden; }

  /* 왼쪽 사이드바 */
  #sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar-header { padding: 16px 14px 12px; border-bottom: 1px solid var(--border); }
  #sidebar-header h1 { font-size: 14px; font-weight: 700; }
  #sidebar-header p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* 검색창 */
  #search-bar { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
  #search-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 9px; outline: none; }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text-muted); }
  #search-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

  /* 새로고침 버튼 */
  #refresh-btn { margin: 8px 12px; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  #refresh-btn:hover { background: rgba(45,107,228,0.15); }
  #refresh-btn.loading { opacity: 0.6; cursor: not-allowed; }
  .spinner { width: 11px; height: 11px; border: 2px solid transparent; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  #refresh-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 기사 목록 */
  #article-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  #article-list::-webkit-scrollbar { width: 3px; }
  #article-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .article-item { padding: 9px 12px; cursor: pointer; border-left: 3px solid transparent; transition: background 0.12s; }
  .article-item:hover { background: rgba(255,255,255,0.04); }
  .article-item.active { background: rgba(45,107,228,0.1); border-left-color: var(--accent); }
  .article-item .tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 3px; margin-bottom: 4px; }
  .article-item .title { font-size: 12px; font-weight: 500; line-height: 1.4; }
  .article-item .meta { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  /* 그래프 영역 */
  #main { flex: 1; position: relative; overflow: hidden; }
  #graph-canvas { width: 100%; height: 100%; }

  /* 줌 버튼 */
  #graph-controls { position: absolute; top: 14px; left: 14px; display: flex; gap: 6px; }
  .ctrl-btn { background: rgba(22,27,34,0.92); border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; width: 30px; height: 30px; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .ctrl-btn:hover { color: var(--text); border-color: var(--accent); }

  /* 범례 */
  #legend { position: absolute; top: 14px; right: 14px; background: rgba(22,27,34,0.92); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 11px; }
  .legend-title { color: var(--text-muted); font-weight: 600; margin-bottom: 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; color: var(--text-muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* 툴팁 */
  #tooltip { position: absolute; pointer-events: none; background: rgba(22,27,34,0.97); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 12px; max-width: 240px; display: none; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  #tooltip .tt-title { font-weight: 600; margin-bottom: 3px; }
  #tooltip .tt-meta { color: var(--text-muted); font-size: 10px; }

  /* 상태바 */
  #status { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(22,27,34,0.9); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--text-muted); pointer-events: none; }

  /* 빈 상태 */
  #empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: var(--text-muted); pointer-events: none; display: none; }
  #empty-state .icon { font-size: 44px; margin-bottom: 10px; opacity: 0.4; }

  /* 상세 패널 (오른쪽) */
  #detail-panel { width: 320px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; position: absolute; right: 0; top: 0; bottom: 0; z-index: 20; }
  #detail-panel.open { transform: translateX(0); }
  #detail-close { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 4px 6px; }
  #detail-content { padding: 18px 16px; flex: 1; overflow-y: auto; }
  #detail-content::-webkit-scrollbar { width: 3px; }
  #detail-content::-webkit-scrollbar-thumb { background: var(--border); }
  .detail-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 4px; margin-bottom: 8px; }
  #detail-title { font-size: 14px; font-weight: 700; line-height: 1.5; margin-bottom: 6px; }
  #detail-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }
  .section-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; margin-top: 14px; }
  #detail-summary { font-size: 12px; line-height: 1.7; background: rgba(0,0,0,0.2); border-radius: 7px; padding: 11px 12px; border-left: 2px solid var(--accent); }
  .rel-item { padding: 8px 10px; background: rgba(0,0,0,0.2); border-radius: 6px; margin-bottom: 5px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; }
  .rel-item:hover { border-color: var(--accent); }
  .rel-label { font-size: 10px; color: var(--accent); font-weight: 600; margin-bottom: 2px; }
  .rel-name { font-size: 11px; }
  .article-link { display: block; margin-top: 12px; font-size: 11px; color: var(--accent); text-decoration: none; }
  .article-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- 왼쪽 사이드바 -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>📰 보험 뉴스 관계도</h1>
    <p>Insurance News Knowledge Graph</p>
  </div>
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="키워드 검색 (예: 수수료, 실손보험)" />
    <button id="search-btn">검색</button>
  </div>
  <button id="refresh-btn">
    <div class="spinner"></div>
    <span>🔄 최신 데이터 불러오기</span>
  </button>
  <button id="add-news-btn" style="margin: 8px 12px 0; background: transparent; border: 1px solid #3fb950; color: #3fb950; border-radius: 6px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer;">
    ➕ 소식 추가하기
  </button>

  <!-- 소식 추가 모달 -->
  <div id="add-news-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center;">
    <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; width: 420px; max-width: 90%;">
      <h3 style="font-size:14px; margin-bottom:14px;">📰 소식 추가하기</h3>

      <div style="display:flex; gap:6px; margin-bottom:12px;">
        <button id="tab-text" class="input-tab active" style="flex:1; padding:6px; font-size:12px; border-radius:6px; border:1px solid var(--accent); background:var(--accent); color:#fff; cursor:pointer;">텍스트</button>
        <button id="tab-image" class="input-tab" style="flex:1; padding:6px; font-size:12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer;">이미지</button>
      </div>

      <div id="text-input-area">
        <textarea id="news-text-input" placeholder="기사 내용이나 소식을 붙여넣으세요..." style="width:100%; height:140px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; padding:10px; resize:vertical; outline:none;"></textarea>
      </div>

      <div id="image-input-area" style="display:none;">
        <input type="file" id="news-image-input" accept="image/*" style="width:100%; font-size:12px; color:var(--text-muted);" />
        <div id="image-preview" style="margin-top:8px;"></div>
      </div>

      <div style="display:flex; gap:8px; margin-top:14px;">
        <button id="cancel-add-news" style="flex:1; padding:8px; font-size:12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer;">취소</button>
        <button id="submit-add-news" style="flex:1; padding:8px; font-size:12px; border-radius:6px; border:none; background:var(--accent); color:#fff; cursor:pointer; font-weight:600;">추가하기</button>
      </div>

      <div id="add-news-status" style="margin-top:10px; font-size:11px; color:var(--text-muted); text-align:center;"></div>
    </div>
  </div>
  <div id="article-list"></div>
</div>

<!-- 그래프 영역 -->
<div id="main">
  <svg id="graph-canvas"></svg>
  <div id="graph-controls">
    <button class="ctrl-btn" id="zoom-in">+</button>
    <button class="ctrl-btn" id="zoom-out">−</button>
    <button class="ctrl-btn" id="zoom-reset">⊙</button>
  </div>
  <div id="legend">
    <div class="legend-title">카테고리</div>
    <div id="legend-items"></div>
  </div>
  <div id="tooltip">
    <div class="tt-title" id="tt-title"></div>
    <div class="tt-meta" id="tt-meta"></div>
  </div>
  <div id="status">데이터 불러오는 중...</div>
  <div id="empty-state">
    <div class="icon">🕸️</div>
    <p>데이터가 없습니다</p>
  </div>
</div>

<!-- 오른쪽 상세 패널 -->
<div id="detail-panel">
  <button id="detail-close">✕</button>
  <div id="detail-content">
    <span class="detail-tag" id="detail-tag"></span>
    <div id="detail-title"></div>
    <div id="detail-meta"></div>
    <div class="section-label">AI 요약</div>
    <div id="detail-summary"></div>
    <div class="section-label">연관 기사</div>
    <div id="rel-list"></div>
    <a id="detail-link" class="article-link" target="_blank">🔗 원문 보기</a>
  </div>
</div>

<script>
// ── 카테고리별 색상 ──────────────────────────
const COLORS = {
  '규제/법률': '#58a6ff',
  '손해율': '#3fb950',
  '상품/보험료/가격': '#ffa657',
  '전속/GA/채널': '#d2a8ff',
  '투자/재무/IFRS': '#79c0ff',
  '건전성/K-ICS': '#f78166',
  '보험시장': '#56d364',
  '기타': '#8b949e',
};

// ── 앱 상태 ──────────────────────────────────
const state = { nodes: [], links: [], selectedId: null, svg: null, g: null, zoom: null };

// ── 서버에서 데이터 불러오기 ─────────────────
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.querySelector('span').textContent = '불러오는 중...';

  try {
    // main.py 서버에서 분석된 뉴스 데이터 가져오기
    // GitHub에서 최신 분석 파일 가져오기
    const baseUrl = 'https://raw.githubusercontent.com/kimgunkyu/insurance-news-graph/master/data/';
    
    // 오늘 날짜로 파일명 생성
    const today = new Date();
    const filename = `analyzed_${today.getFullYear()}_${String(today.getMonth()+1).padStart(2,'0')}_${String(today.getDate()).padStart(2,'0')}.json`;
    
    const res = await fetch(baseUrl + filename + '?t=' + Date.now());
    const data = await res.json();

    if (!data.articles || data.articles.length === 0) {
      document.getElementById('empty-state').style.display = 'block';
      document.getElementById('status').textContent = '데이터 없음 — analyzer.py를 먼저 실행하세요';
      return;
    }

    // 상태에 저장
    state.nodes = data.articles;
    state.links = data.relationships;

    // 화면 업데이트
    renderSidebar();
    initGraph();
    updateLegend();
    document.getElementById('empty-state').style.display = 'none';

  } catch(e) {
    document.getElementById('status').textContent = '서버 연결 실패 — python main.py 실행했나요?';
    console.error(e);
  } finally {
    btn.classList.remove('loading');
    btn.querySelector('span').textContent = '🔄 최신 데이터 불러오기';
  }
}

// ── 사이드바 기사 목록 렌더링 ────────────────
function renderSidebar() {
  const list = document.getElementById('article-list');
  const visible = state.nodes.filter(n => !n.hidden);
  list.innerHTML = visible.map(n => {
    const c = COLORS[n.category] || COLORS['기타'];
    return `<div class="article-item ${n.id === state.selectedId ? 'active' : ''}" data-id="${n.id}">
      <span class="tag" style="background:${c}22;color:${c}">${n.category}</span>
      <div class="title">${n.title}</div>
      <div class="meta">${n.source} · ${n.date}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.article-item').forEach(el =>
    el.addEventListener('click', () => selectNode(el.dataset.id))
  );
}

// ── 키워드 검색 필터 ─────────────────────────
function filterByKeyword(kw) {
  if (!kw.trim()) {
    state.nodes.forEach(n => n.hidden = false);
    state.links.forEach(l => l.hidden = false);
  } else {
    const lower = kw.toLowerCase();
    state.nodes.forEach(n => {
      n.hidden = ![n.title, n.summary, n.category, ...(n.keywords||[])].some(s => s?.toLowerCase().includes(lower));
    });
    const vis = new Set(state.nodes.filter(n => !n.hidden).map(n => n.id));
    state.links.forEach(l => {
      const s = l.source?.id||l.source, t = l.target?.id||l.target;
      l.hidden = !vis.has(s) || !vis.has(t);
    });
  }
  renderSidebar();
  initGraph();
}

// ── 노드 선택 ────────────────────────────────
function selectNode(id) {
  state.selectedId = id;
  const node = state.nodes.find(n => n.id === id);
  if (!node) return;
  renderSidebar();
  highlightGraph(id);
  openDetail(node);
}

// ── 상세 패널 열기 ───────────────────────────
function openDetail(node) {
  const c = COLORS[node.category] || COLORS['기타'];
  document.getElementById('detail-tag').textContent = node.category;
  document.getElementById('detail-tag').style.cssText = `background:${c}22;color:${c}`;
  document.getElementById('detail-title').textContent = node.title;
  document.getElementById('detail-meta').textContent = `${node.source} · ${node.date}`;
  document.getElementById('detail-summary').textContent = node.summary;

  // 원문 링크
  const linkEl = document.getElementById('detail-link');
  if (node.link) { linkEl.href = node.link; linkEl.style.display = 'block'; }
  else { linkEl.style.display = 'none'; }

  // 연관 기사 목록
  const related = state.links
    .filter(l => { const s=l.source?.id||l.source, t=l.target?.id||l.target; return s===node.id||t===node.id; })
    .map(l => {
      const otherId = (l.source?.id||l.source)===node.id ? (l.target?.id||l.target) : (l.source?.id||l.source);
      const other = state.nodes.find(n => n.id === otherId);
      return other ? { node: other, label: l.label } : null;
    }).filter(Boolean);

  document.getElementById('rel-list').innerHTML = related.map(r =>
    `<div class="rel-item" data-id="${r.node.id}">
      <div class="rel-label">↔ ${r.label||'연관'}</div>
      <div class="rel-name">${r.node.title}</div>
    </div>`
  ).join('') || '<div style="color:var(--text-muted);font-size:11px">연관 기사 없음</div>';

  document.querySelectorAll('.rel-item').forEach(el =>
    el.addEventListener('click', () => selectNode(el.dataset.id))
  );
  // 삭제 버튼 추가 (기존에 있으면 지우고 새로 추가)
  const oldDeleteBtn = document.getElementById('delete-article-btn');
  if (oldDeleteBtn) oldDeleteBtn.remove();

  const deleteBtn = document.createElement('button');
  deleteBtn.id = 'delete-article-btn';
  deleteBtn.textContent = '🗑️ 이 소식 삭제';
  deleteBtn.style.cssText = 'width:100%; margin-top:16px; padding:8px; font-size:11px; border-radius:6px; border:1px solid #f78166; background:transparent; color:#f78166; cursor:pointer;';
  deleteBtn.addEventListener('click', async () => {
    if (!confirm(`"${node.title}" 소식을 삭제할까요?`)) return;

    deleteBtn.textContent = '삭제 중...';
    deleteBtn.disabled = true;

    try {
      const res = await fetch(`${SERVER_URL}/api/delete-news/${node.id}`, { method: 'DELETE' });
      const result = await res.json();

      if (result.status === 'success') {
        document.getElementById('detail-panel').classList.remove('open');
        setTimeout(() => loadData(), 1000);
      } else {
        alert('삭제 실패: ' + result.message);
        deleteBtn.textContent = '🗑️ 이 소식 삭제';
        deleteBtn.disabled = false;
      }
    } catch (e) {
      alert('서버 연결 실패: ' + e.message);
      deleteBtn.textContent = '🗑️ 이 소식 삭제';
      deleteBtn.disabled = false;
    }
  });

  document.getElementById('detail-content').appendChild(deleteBtn);
    
  document.getElementById('detail-panel').classList.add('open');
}

// ── D3 그래프 초기화 ─────────────────────────
function initGraph() {
  const container = document.getElementById('main');
  const W = container.clientWidth, H = container.clientHeight;
  d3.select('#graph-canvas').selectAll('*').remove();

  const svg = d3.select('#graph-canvas').attr('width', W).attr('height', H);
  const zoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  state.zoom = zoom; state.svg = svg;

  const g = svg.append('g');
  state.g = g;

  // 글로우 필터 (연결 많은 노드에 빛나는 효과)
  const defs = svg.append('defs');
  const glow = defs.append('filter').attr('id', 'glow');
  glow.append('feGaussianBlur').attr('stdDeviation', '3.5').attr('result', 'blur');
  const fm = glow.append('feMerge');
  fm.append('feMergeNode').attr('in', 'blur');
  fm.append('feMergeNode').attr('in', 'SourceGraphic');

  const visNodes = state.nodes.filter(n => !n.hidden);
  const visIds = new Set(visNodes.map(n => n.id));
  const visLinks = state.links.filter(l => {
    const s=l.source?.id||l.source, t=l.target?.id||l.target;
    return visIds.has(s) && visIds.has(t) && !l.hidden;
  });

  // 연결 수에 따라 노드 크기 결정
  const degree = {};
  visNodes.forEach(n => degree[n.id] = 0);
  visLinks.forEach(l => {
    const s=l.source?.id||l.source, t=l.target?.id||l.target;
    degree[s] = (degree[s]||0) + 1;
    degree[t] = (degree[t]||0) + 1;
  });
  const rScale = d3.scaleSqrt().domain([0, d3.max(Object.values(degree))||1]).range([8, 26]);

  // 물리 시뮬레이션 (노드들이 자연스럽게 퍼지도록)
  const sim = d3.forceSimulation(visNodes)
    .force('link', d3.forceLink(visLinks).id(d => d.id).distance(90).strength(0.5))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide().radius(d => rScale(degree[d.id]||0) + 5));

  // 엣지(연결선) 그리기
  const link = g.append('g').selectAll('line').data(visLinks).join('line')
    .attr('stroke', '#30363d')
    .attr('stroke-width', d => 1 + (d.strength||0.5) * 2)
    .attr('opacity', 0.55);

  // 엣지 라벨
  const linkLabel = g.append('g').selectAll('text').data(visLinks).join('text')
    .attr('font-size', 9).attr('fill', '#484f58').attr('text-anchor', 'middle')
    .text(d => d.label||'');

  // 노드 그룹 (드래그 가능)
  const nodeG = g.append('g').selectAll('g').data(visNodes).join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click', (e,d) => { e.stopPropagation(); selectNode(d.id); })
    .on('mouseover', (e,d) => {
      const tt = document.getElementById('tooltip');
      document.getElementById('tt-title').textContent = d.title;
      document.getElementById('tt-meta').textContent = `${d.source} · ${d.date}`;
      tt.style.display = 'block';
      tt.style.left = (e.pageX+12)+'px';
      tt.style.top = (e.pageY-10)+'px';
    })
    .on('mousemove', e => {
      const tt = document.getElementById('tooltip');
      tt.style.left = (e.pageX+12)+'px';
      tt.style.top = (e.pageY-10)+'px';
    })
    .on('mouseout', () => { document.getElementById('tooltip').style.display = 'none'; });

  // 노드 원 그리기
  nodeG.append('circle')
    .attr('r', d => rScale(degree[d.id]||0))
    .attr('fill', d => COLORS[d.category]||COLORS['기타'])
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => COLORS[d.category]||COLORS['기타'])
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.4)
    .attr('filter', d => (degree[d.id]||0) >= 3 ? 'url(#glow)' : null);

  // 노드 라벨 (큰 노드만)
  nodeG.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', d => rScale(degree[d.id]||0) + 10)
    .attr('font-size', 9.5).attr('fill', '#7d8590')
    .text(d => rScale(degree[d.id]||0) < 12 ? '' : d.title.length > 12 ? d.title.slice(0,12)+'…' : d.title);

  // 매 틱마다 위치 업데이트
  sim.on('tick', () => {
    link.attr('x1', d=>d.source.x).attr('y1', d=>d.source.y).attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
    linkLabel.attr('x', d=>(d.source.x+d.target.x)/2).attr('y', d=>(d.source.y+d.target.y)/2);
    nodeG.attr('transform', d=>`translate(${d.x},${d.y})`);
  });

  document.getElementById('status').textContent = `노드 ${visNodes.length}개 · 엣지 ${visLinks.length}개`;

  // 줌 버튼
  document.getElementById('zoom-in').onclick = () => svg.transition().call(zoom.scaleBy, 1.4);
  document.getElementById('zoom-out').onclick = () => svg.transition().call(zoom.scaleBy, 0.7);
  document.getElementById('zoom-reset').onclick = () => svg.transition().call(zoom.transform, d3.zoomIdentity.translate(W/2,H/2).scale(0.9).translate(-W/2,-H/2));

  // 배경 클릭 시 선택 해제
  svg.on('click', () => {
    state.selectedId = null;
    document.getElementById('detail-panel').classList.remove('open');
    renderSidebar();
    resetHighlight();
  });
}

// ── 선택된 노드 하이라이트 ───────────────────
function highlightGraph(id) {
  if (!state.g) return;
  const conn = new Set([id]);
  state.links.forEach(l => {
    const s=l.source?.id||l.source, t=l.target?.id||l.target;
    if(s===id) conn.add(t);
    if(t===id) conn.add(s);
  });
  state.g.selectAll('circle').attr('opacity', d => conn.has(d.id) ? 1 : 0.15).attr('stroke-width', d => d.id===id ? 3 : 1.5);
  state.g.selectAll('line').attr('opacity', d => {
    const s=d.source?.id||d.source, t=d.target?.id||d.target;
    return (s===id||t===id) ? 1 : 0.05;
  });
}

function resetHighlight() {
  if (!state.g) return;
  state.g.selectAll('circle').attr('opacity', 0.85).attr('stroke-width', 1.5);
  state.g.selectAll('line').attr('opacity', 0.55);
}

// ── 범례 업데이트 + 클릭 필터 ────────────────
function updateLegend() {
  const cats = [...new Set(state.nodes.map(n => n.category))];
  document.getElementById('legend-items').innerHTML = cats.map(c =>
    `<div class="legend-item" data-cat="${c}" style="cursor:pointer;" title="${c} 필터">
      <div class="legend-dot" style="background:${COLORS[c]||COLORS['기타']}"></div>${c}
    </div>`
  ).join('');

  // 선택된 카테고리 상태 관리
  let selectedCats = new Set();

  document.querySelectorAll('.legend-item').forEach(el => {
    el.addEventListener('click', (e) => {
      const cat = el.dataset.cat;
      const isCtrl = e.ctrlKey || e.metaKey;  // Ctrl 또는 Mac의 Cmd

      if (isCtrl) {
        // Ctrl 클릭 → 누적 선택
        if (selectedCats.has(cat)) {
          selectedCats.delete(cat);
          el.style.opacity = '0.4';
        } else {
          selectedCats.add(cat);
          el.style.opacity = '1';
        }
      } else {
        // 일반 클릭
        if (selectedCats.has(cat) && selectedCats.size === 1) {
          // 이미 선택된 것 하나만 있을 때 다시 클릭 → 전체 해제
          selectedCats.clear();
          document.querySelectorAll('.legend-item').forEach(e => e.style.opacity = '1');
        } else {
          // 다른 거 선택 → 기존 초기화 후 새로 선택
          selectedCats.clear();
          selectedCats.add(cat);
          document.querySelectorAll('.legend-item').forEach(e => e.style.opacity = '0.4');
          el.style.opacity = '1';
        }
      }

      // 필터 적용
      if (selectedCats.size === 0) {
        filterByCategory(null);
      } else {
        filterByCategory([...selectedCats]);
      }
    });
  });
}

// ── 카테고리 필터 ────────────────────────────
function filterByCategory(cats) {
  if (!cats || cats.length === 0) {
    // 필터 해제 → 전체 표시
    state.nodes.forEach(n => n.hidden = false);
    state.links.forEach(l => l.hidden = false);
  } else {
    // 선택된 카테고리만 표시
    state.nodes.forEach(n => n.hidden = !cats.includes(n.category));
    const vis = new Set(state.nodes.filter(n => !n.hidden).map(n => n.id));
    state.links.forEach(l => {
      const s = l.source?.id||l.source, t = l.target?.id||l.target;
      l.hidden = !vis.has(s) || !vis.has(t);
    });
  }
  renderSidebar();
  initGraph();
}

// ── 이벤트 리스너 ────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', loadData);
document.getElementById('search-btn').addEventListener('click', () => {
  filterByKeyword(document.getElementById('search-input').value);
});
document.getElementById('search-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') filterByKeyword(document.getElementById('search-input').value);
});
document.getElementById('search-input').addEventListener('input', e => {
  if(!e.target.value) filterByKeyword('');
});
document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('open');
  state.selectedId = null;
  renderSidebar();
  resetHighlight();
});
window.addEventListener('resize', () => { if(state.nodes.length) initGraph(); });


// ── 소식 추가 기능 ────────────────────────────

// 서버 주소 (로컬 테스트용 - 나중에 Render 주소로 변경)
const SERVER_URL = 'https://insurance-news-graph.onrender.com';

let selectedInputType = 'text';   // 현재 선택된 입력 방식

// 모달 열기
document.getElementById('add-news-btn').addEventListener('click', () => {
  document.getElementById('add-news-modal').style.display = 'flex';
});

// 모달 닫기
document.getElementById('cancel-add-news').addEventListener('click', () => {
  document.getElementById('add-news-modal').style.display = 'none';
  document.getElementById('news-text-input').value = '';
  document.getElementById('news-image-input').value = '';
  document.getElementById('image-preview').innerHTML = '';
  document.getElementById('add-news-status').textContent = '';
});

// 탭 전환 (텍스트 / 이미지)
document.getElementById('tab-text').addEventListener('click', () => {
  selectedInputType = 'text';
  document.getElementById('tab-text').style.background = 'var(--accent)';
  document.getElementById('tab-text').style.color = '#fff';
  document.getElementById('tab-text').style.borderColor = 'var(--accent)';
  document.getElementById('tab-image').style.background = 'transparent';
  document.getElementById('tab-image').style.color = 'var(--text-muted)';
  document.getElementById('tab-image').style.borderColor = 'var(--border)';
  document.getElementById('text-input-area').style.display = 'block';
  document.getElementById('image-input-area').style.display = 'none';
});

document.getElementById('tab-image').addEventListener('click', () => {
  selectedInputType = 'image';
  document.getElementById('tab-image').style.background = 'var(--accent)';
  document.getElementById('tab-image').style.color = '#fff';
  document.getElementById('tab-image').style.borderColor = 'var(--accent)';
  document.getElementById('tab-text').style.background = 'transparent';
  document.getElementById('tab-text').style.color = 'var(--text-muted)';
  document.getElementById('tab-text').style.borderColor = 'var(--border)';
  document.getElementById('image-input-area').style.display = 'block';
  document.getElementById('text-input-area').style.display = 'none';
});

// 이미지 미리보기
document.getElementById('news-image-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  const preview = document.getElementById('image-preview');
  if (file) {
    const url = URL.createObjectURL(file);
    preview.innerHTML = `<img src="${url}" style="max-width:100%; border-radius:6px; margin-top:6px;" />`;
  } else {
    preview.innerHTML = '';
  }
});

// 추가하기 버튼 클릭 → 서버로 전송
document.getElementById('submit-add-news').addEventListener('click', async () => {
  const statusEl = document.getElementById('add-news-status');
  const submitBtn = document.getElementById('submit-add-news');

  const formData = new FormData();

  if (selectedInputType === 'text') {
    const text = document.getElementById('news-text-input').value.trim();
    if (!text) {
      statusEl.textContent = '⚠️ 텍스트를 입력해주세요.';
      return;
    }
    formData.append('text', text);
  } else {
    const fileInput = document.getElementById('news-image-input');
    if (!fileInput.files[0]) {
      statusEl.textContent = '⚠️ 이미지를 선택해주세요.';
      return;
    }
    formData.append('image', fileInput.files[0]);
  }

  statusEl.textContent = '🤖 AI가 분석 중입니다... (최대 1분 소요)';
  submitBtn.disabled = true;
  submitBtn.style.opacity = '0.5';

  try {
    const res = await fetch(`${SERVER_URL}/api/add-news`, {
      method: 'POST',
      body: formData,
    });
    const result = await res.json();

    if (result.status === 'success') {
      statusEl.textContent = `✅ ${result.message}`;
      statusEl.style.color = '#3fb950';

      // 2초 후 모달 닫고 데이터 새로고침
      setTimeout(() => {
        document.getElementById('add-news-modal').style.display = 'none';
        document.getElementById('news-text-input').value = '';
        document.getElementById('news-image-input').value = '';
        document.getElementById('image-preview').innerHTML = '';
        statusEl.textContent = '';
        statusEl.style.color = 'var(--text-muted)';
        loadData();   // 관계도 새로고침
      }, 1500);
    } else {
      statusEl.textContent = `❌ ${result.message}`;
      statusEl.style.color = '#f78166';
    }
  } catch (e) {
    statusEl.textContent = `❌ 서버 연결 실패: ${e.message}`;
    statusEl.style.color = '#f78166';
  } finally {
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
  }
});

// ── 앱 시작 시 자동으로 데이터 불러오기 ──────
loadData();
</script>
